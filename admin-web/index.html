<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>后台管理系统</title>
	<link rel="stylesheet" href="style.css">
	<!-- 引入Chart.js库 -->
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
	<div class="admin-container">
		<div class="sidebar" id="sidebar">
			<div class="sidebar-header">
				<h1 class="sidebar-title" id="sidebarTitle">后台管理系统</h1>
				<button class="sidebar-toggle" id="sidebarToggle">
					<span class="toggle-icon">☰</span>
				</button>
			</div>
			<div class="sidebar-menu">
				<div class="menu-item active" data-menu="user">
					<span class="menu-icon"></span>
					<span class="menu-text">用户管理</span>
				</div>
				<div class="menu-item" data-menu="content">
					<span class="menu-icon"></span>
					<span class="menu-text">内容管理</span>
				</div>
				<div class="menu-item" data-menu="stats">
					<span class="menu-icon"></span>
					<span class="menu-text">数据统计</span>
				</div>
				<div class="menu-item" data-menu="logs">
					<span class="menu-icon"></span>
					<span class="menu-text">系统日志</span>
				</div>
				<div class="menu-item" data-menu="carousel">
					<span class="menu-icon"></span>
					<span class="menu-text">轮播图管理</span>
				</div>
				<div class="menu-item" data-menu="version">
					<span class="menu-icon"></span>
					<span class="menu-text">版本管理</span>
				</div>
				<div class="menu-item" data-menu="announcement">
				<span class="menu-icon"></span>
				<span class="menu-text">公告管理</span>
			</div>
			<div class="menu-item" data-menu="recommendation">
				<span class="menu-icon"></span>
				<span class="menu-text">智能推荐管理</span>
			</div>
			<div class="menu-item" data-menu="user_profile">
				<span class="menu-icon"></span>
				<span class="menu-text">用户画像分析</span>
			</div>
			<div class="menu-item" data-menu="content_similarity">
					<span class="menu-icon"></span>
					<span class="menu-text">内容相似度分析</span>
				</div>
				<div class="menu-item" data-menu="article">
					<span class="menu-icon"></span>
					<span class="menu-text">文章管理</span>
				</div>
				<div class="menu-item" data-menu="feedback">
					<span class="menu-icon"></span>
					<span class="menu-text">问题反馈管理</span>
				</div>
			</div>
			<div class="sidebar-footer">
				<div class="admin-info">
					<span class="admin-name" id="adminName">管理员</span>
				</div>
				<button class="btn btn-logout" id="logoutBtn">退出登录</button>
			</div>
		</div>
		
		<div class="main-content">
			<div class="content-header">
				<h2 class="content-title" id="menuTitle">用户管理</h2>
				<div class="header-actions">
					<button class="btn btn-primary" id="addBtn">添加</button>
				</div>
			</div>
			
			<div class="content-body">
				<div class="table-container">
					<div class="table-header">
						<div class="table-cell cell-id">ID</div>
						<div class="table-cell cell-username">用户名</div>
						<div class="table-cell cell-email">邮箱</div>
						<div class="table-cell cell-role">角色</div>
						<div class="table-cell cell-time">注册时间</div>
						<div class="table-cell cell-actions">操作</div>
					</div>
					<div class="table-body" id="tableBody">
					</div>
				</div>
			</div>
		</div>
	</div>
	
	<div class="modal" id="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h3 class="modal-title" id="modalTitle">添加项目</h3>
				<button class="modal-close" id="modalClose">&times;</button>
			</div>
			<div class="modal-body" id="modalBody">
			</div>
			<div class="modal-footer">
				<button class="btn btn-secondary" id="modalCancel">取消</button>
				<button class="btn btn-primary" id="modalConfirm">确认</button>
			</div>
		</div>
	</div>
	
	<script src="script.js"></script>
</body>
</html>
